description_ru: >
  Сценарий «Сталкера» написан самими Стругацкими на основе их повести
  «Пикник на обочине» (1972). Финальная редакция сценария сильно
  отдалилась от первоисточника: исчезает «хабар» и большая часть
  фантастической атрибутики, а Зона смещается в сторону философской
  параболы.
