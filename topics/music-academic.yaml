id: music-academic
name_ru: Академическая и киномузыка
description_ru: >
  Композиторы кино и сцены соцлагеря: Шостакович, Шнитке, Свиридов,
  Гаврилин, Слонимский, плюс ключевые киномузыканты (Таривердиев,
  Артемьев, Петров, Зацепин, Канчели). Балеты, оперы, экранизации
  концертов, документальные портреты.
long_description_ru: >
  Граница между «киномузыкой» и «академической партитурой» в СССР была
  размытой: симфонисты писали для кино, а кинокомпозиторы — для зала.
  Сюда же — телепостановки балета (Мариинский, Большой) и эксперимент
  «Музыкальной редакции» Центрального телевидения.
schema_version: 1
