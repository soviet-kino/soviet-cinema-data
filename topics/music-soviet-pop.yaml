id: music-soviet-pop
name_ru: Эстрада и поп
description_ru: >
  Массовая популярная музыка соцлагеря: ВИА, эстрадные звёзды,
  «Голубой огонёк», «Песня года», концерты Пугачёвой, Лещенко,
  Магомаева, «Песняров», эстрады союзных республик.
  Раздел собирает фильмы-концерты, клипы и телепрограммы.
long_description_ru: >
  Эстрада в советском кино — пограничная форма: официальная, гладкая,
  но в лучших образцах удивительно изобретательная — от микропантомим
  Магомаева до клиповой эстетики «Песни года» поздних 1980-х.
  Сюда же — союзные традиции: грузинская «Орера», армянская «Бамбир»,
  молдавская «Норок», латышский «Эолика».
