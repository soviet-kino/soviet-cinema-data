id: films-for-youth
name_ru: Молодёжное кино (18–25)
description_ru: >
  Кино о студентах, рабочей молодёжи, армии, первой любви, выборе пути.
  «Курьер», «Розыгрыш», «Однажды двадцать лет спустя», «Я шагаю по
  Москве», поздние перестроечные «Маленькая Вера», «Асса», «Игла».
  Граничит с «молодёжной волной» 1960-х и поколенческим высказыванием
  1980-х.
