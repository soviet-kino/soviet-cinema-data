id: films-by-petrov
name_ru: Кино Андрея Петрова
description_ru: >
  Фильмы, к которым Андрей Павлович Петров написал музыку.
  Постоянный композитор Эльдара Рязанова («Берегись автомобиля»,
  «Жестокий романс», «Служебный роман»), Георгия Данелии («Я шагаю
  по Москве», «Осенний марафон»). Меланхолическая мелодика стала
  голосом «оттепельного» и брежневского кино.
