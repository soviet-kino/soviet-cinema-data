id: literary-adaptations
name_ru: Экранизации литературных произведений
name_original: Экранизации
description_ru: >
  Фильмы, в основе которых лежит конкретное литературное произведение —
  от классических романов до современной прозы.
long_description_ru: >
  В разделе — фильмы, для которых первичен литературный источник:

  1. Экранизации классики (Толстой, Достоевский, Чехов, Гоголь, Шолохов
     и др.) — отдельный устойчивый жанр советского и восточноевропейского
     кинопроцесса.
  2. Экранизации современной прозы — Стругацкие, Быков, Грабал,
     Айтматов, Анджеевский.
  3. Экранизации зарубежной литературы — Шекспир, Сервантес, Стивенсон,
     Дюма, Кэрролл.

  Условие включения — литературный источник зафиксирован в полях фильма
  (например, через reference с kind: adaptation). Сборники и
  «по мотивам» — на усмотрение редакторов.
