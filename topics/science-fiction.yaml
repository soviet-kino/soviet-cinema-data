id: science-fiction
name_ru: Научная фантастика
name_original: Научная фантастика
description_ru: >
  Фильмы научно-фантастической традиции: космос, ИИ, контакт, технологии
  будущего, антиутопии.
long_description_ru: >
  В раздел входят фильмы научно-фантастического жанра в широком
  понимании:

  1. Космос и контакт — путешествия за пределы Земли, встреча с иным
     разумом.
  2. Будущее и антиутопия — модель общества, которая не существует,
     но могла бы.
  3. Технология как герой — изобретатель, машина, эксперимент.
  4. Параллельные миры — реальности, развивающиеся по иным законам.

  Хрононавтика (путешествия во времени) пересекается с этим разделом,
  но выделена в отдельную тему: там акцент на структуре времени, а
  здесь — на фантастической эпистемологии. Фильм может входить в обе.
