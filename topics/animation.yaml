id: animation
name_ru: Мультипликация
description_ru: >
  Анимация соцлагеря — целая параллельная вселенная: «Союзмультфильм»,
  «Беларусьфильм», «Киевнаучфильм», ЧССР (Йиржи Трнка, Карел Земан),
  Польша («Се-ма-фор», Лен Лай), Эстония (нукк-кино), Грузия (Бакур
  Сулакаури). Шкала — от пластилиновой кукольной классики до Норштейна
  и Хржановского.
long_description_ru: >
  Раздел собирает мультфильмы всех технологий: рисованные, кукольные,
  перекладные, песочные, силуэтные, ранние компьютерные эксперименты
  «Кубика», экспериментальные ленты Хржановского, Норштейна, Хитрука,
  Курчевского, Назарова, Трнки, Земана, Дворника, Поярковой. Категория
  не сводится к «детскому» — половина шедевров адресована взрослым.
