id: chrononautics
name_ru: Хрононавтика
name_original: Хрононавтика
description_ru: >
  Тематический раздел: фильмы о путешествиях во времени, петлях времени,
  машинах времени и нелинейной структуре времени.
long_description_ru: >
  В раздел включаются работы, в которых время — не просто фон, а
  сюжетообразующий или структурный элемент. К рассмотрению принимаются
  три типа фильмов:

  1. Прямая фантастика о перемещении во времени (машина времени,
     порталы, ускоренное/замедленное время).
  2. Фильмы с нелинейной структурой повествования, где воспоминания,
     сны или предчувствия равноправны с настоящим.
  3. Историко-аллегорические фильмы, где смещение в иную эпоху работает
     как эзопов язык — способ говорить о современности.

  Конкретные тезисы и разборы по каждому фильму — задача редакторов
  (см. essays/). Этот файл фиксирует только определение раздела и
  ссылки на связанные мотивы.
related_motifs:
  - mirror-as-threshold
  - rain-as-memory
