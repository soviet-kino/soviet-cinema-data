id: childrens-cinema
name_ru: Детское кино
description_ru: >
  Фильмы, снятые для детской и подростковой аудитории.
long_description_ru: >
  В разделе — фильмы, изначально адресованные детскому или
  подростковому зрителю. К рассмотрению принимаются:

  1. Игровые фильмы и киносказки.
  2. Школьные и пионерские повести.
  3. Детская научная фантастика и приключения.

  Анимация в раздел не входит — для неё может быть открыта отдельная
  тема. Раздел собирает не только «фильмы для детей», но и фильмы
  «о детях» — взгляд из детства на эпоху часто оказывался
  единственным разрешённым способом говорить о взрослом.
