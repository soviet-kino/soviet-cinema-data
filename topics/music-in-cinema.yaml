id: music-in-cinema
name_ru: Музыка в кино
description_ru: >
  Раздел о саундтреке советского кино — композиторах-кинематографистах,
  жанре мюзикла, песнях, ставших частью национальной памяти.
  Внутри — подтемы по композиторам (Таривердиев, Артемьев, Петров…)
  и кросс-ссылки на жанр «мюзикл».
