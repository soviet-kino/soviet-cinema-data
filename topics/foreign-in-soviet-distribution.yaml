id: foreign-in-soviet-distribution
name_ru: Зарубежное в советском прокате
description_ru: >
  Иностранные фильмы, выходившие в СССР через Совэкспортфильм/Госкино.
  Дубляж советских актёров стал отдельным явлением: «Блеф» с голосом
  Караченцова за Челентано, «Фантомас» с Кенигсоном за Маре. Часто
  с купюрами цензора.
long_description_ru: >
  Раздел собирает фильмы, формально произведённые вне соцлагеря, но
  ставшие частью советского зрительского опыта. У такого фильма две
  даты: оригинальная и год советского проката (поле soviet_release.year).
  Иногда они отличаются на пять-десять лет: например «Спартак» Кубрика
  1960-го вышел в СССР в 1967-м.

  Что важно для раздела:
  - дубляж — особый художественный язык, часто превосходивший оригинал
    по выразительности (например, дубляж «Блефа», «Грека Зорбы»);
  - цензурные сокращения — что вырезали и почему;
  - факт официального проката — это означало, что фильм прошёл через
    Госкино и был массово увиден миллионами.
