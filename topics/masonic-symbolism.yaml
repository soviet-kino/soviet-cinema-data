id: masonic-symbolism
name_ru: Масонская символика в кино
description_ru: >
  Спорная исследовательская тема: попытки прочесть в советском кино
  визуальные и сюжетные отсылки к эзотерической традиции — масонские
  знаки, нумерологию, скрытые иерархии. Раздел открыт как площадка
  для редакторской подборки и аргументированных эссе.
  Все фильмы здесь — speculative; включение в подборку не утверждает
  ничего о намерениях авторов фильма.
long_description_ru: >
  Тема существует как наблюдательный полигон. AI-импортёр в неё фильмы
  не добавляет: интерпретации второго смыслового ряда — работа
  редактора-человека. Каждый фильм в подборке должен сопровождаться
  эссе или ссылкой на исследование. Без обоснования — фильмы убираются.
schema_version: 1
