id: music-soviet-rock
name_ru: Рок и андеграунд
description_ru: >
  Неофициальная музыка соцлагеря: ленинградский и московский рок-клубы,
  «Машина времени», «Аквариум», «Кино», «Наутилус», «Чайф», Цой,
  «Поп-механика» Курёхина, а также Plastic People of the Universe
  и DG 307 из ЧССР, Krzak и Maanam из ПНР, Pankrti из СФРЮ.
long_description_ru: >
  Рок в социалистических странах прошёл путь от полного запрета
  через формат «художественной самодеятельности» к легализации
  в годы перестройки. Сюда же — концертные записи «Поп-механики»,
  фильмы «Асса» и «Игла» как окно в субкультуру, чешские
  андеграундные документации Тржиновых и Шпатных.
