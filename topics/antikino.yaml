id: antikino
name_ru: Антикино
name_original: Антикино
description_ru: >
  Фильмы, сознательно нарушающие нарративные, жанровые и
  идеологические нормы своего времени.
long_description_ru: >
  Под «антикино» в разделе понимается широкий спектр работ, которые
  не вписываются в магистральные жанровые и идеологические рамки
  своего времени:

  1. Экспериментальный нарратив — разрушенная фабула, нелинейность,
     поэтический монтаж, медитативное время.
  2. Авторское кино вне канона соцреализма — фильмы, балансирующие
     на границе разрешённого, иногда снятые «на полку».
  3. Метатекст и саморефлексия — фильмы о фильмах, обнажение приёма,
     ломка четвёртой стены.
  4. Стилистическая контркультура — внутри государственной киностудии,
     но против её эстетических конвенций.

  Включение фильма в раздел — кураторское решение редактора, требующее
  обоснования в эссе. Поэтому здесь скорее работает разметка
  post factum, чем массовый импорт.
