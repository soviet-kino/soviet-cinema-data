id: music-bards
name_ru: Авторская песня и барды
description_ru: >
  Кухонная и магнитофонная традиция: Высоцкий, Окуджава, Галич,
  Никитины, Визбор, Городницкий, Юрий Кукин. Концертные записи,
  телевыступления, документальные портреты, фильмы по песням
  (например, «Вертикаль» с песнями Высоцкого).
long_description_ru: >
  Бардовская песня — параллельная литература соцлагеря: распространялась
  магнитофонными копиями, цензурировалась, выходила на экраны редко
  и фрагментарно. Подборка собирает то немногое, что было заснято —
  и часто запрещено к показу.
schema_version: 1
