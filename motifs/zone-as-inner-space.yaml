id: zone-as-inner-space
name_ru: Зона как внутреннее пространство
description_ru: >
  Огороженная, опасная, аномальная территория функционирует не как
  топография, а как пространственная метафора внутренней жизни героя.
  Прохождение через Зону — путь самопознания и испытания. Канонический
  пример — «Сталкер»; в более широком прочтении мотив распространяется
  на «закрытые», «запретные» зоны в позднесоветском и восточноевропейском
  кино как способ обойти прямой политический высказывание.
category: [spatial, existential, political]
schema_version: 1
