id: rain-as-memory
name_ru: Дождь как память
description_ru: >
  Дождь регулярно сопровождает сцены воспоминаний, снов и переходных
  состояний сознания героя, становясь визуальным маркером сдвига во времени
  и снятия границы между настоящим и прошлым. Особенно последовательно
  работает у Тарковского, но встречается и шире — как часть общей
  «поэтической» традиции советского авторского кино.
category: [visual, temporal]
schema_version: 1
