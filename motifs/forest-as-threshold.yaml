id: forest-as-threshold
name_ru: Лес как порог
description_ru: >
  Зимний или болотистый лес — пограничное пространство, где обычные
  социальные роли и идеологические маски срываются, а персонаж оказывается
  один на один с собой и со смертью. Часто работает как ритуальное место
  испытания и инициации.
category: [spatial, existential, religious]
schema_version: 1
