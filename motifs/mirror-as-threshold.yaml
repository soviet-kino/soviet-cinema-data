id: mirror-as-threshold
name_ru: Зеркало как порог
description_ru: >
  Зеркало в кадре часто работает не как декоративная деталь, а как граница
  между мирами: настоящим и прошлым, реальным и воображаемым, живым и мёртвым.
  Взгляд героя в зеркало или прохождение мимо отражающей поверхности — приём,
  фиксирующий смену плана сознания.
category: [visual, existential]
schema_version: 1
