id: train-as-fate
name_ru: Поезд как судьба
description_ru: >
  Поезд и железная дорога — устойчивый мотив восточноевропейского
  военного кино. Расписание, узел, диспетчер, проходящий через станцию
  состав превращаются в фигуру судьбы, исторической неизбежности и
  одновременно — в место камерной частной драмы внутри большого
  исторического движения.
category: [visual, spatial, existential]
schema_version: 1
